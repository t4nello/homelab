services:
  traefik:
    container_name: traefik
    image: traefik:latest
    networks:
      - management
      - monitoring
      - applications
    labels:
      - "logaggregation=yes"
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${HOST}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=simpleauth"
      - "traefik.http.middlewares.simpleauth.basicauth.usersfile=/usersfile"
    command:
      - "--api=true"
      - "--ping=true"
      - "--log.level=debug"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.file.filename=/etc/traefik/definition.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./usersfile:/usersfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloudflared-tunnel:
    container_name: cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    networks:
      - management
      - monitoring
    labels:
      - "logaggregation=yes"
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TUNNEL_LOGLEVEL=info
      - TUNNEL_METRICS=0.0.0.0:60123
    command: tunnel run
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "localhost:60123", "ready"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 40s

  portainer:
    container_name: portainer
    image: portainer/portainer-${PORTAINER_EDITION:-ce}:latest
    networks:
      - management
    labels:
      - "logaggregation=yes"
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${HOST}`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=management"
    environment:
      - TRUSTED_ORIGINS=portainer.${HOST}
      - PORTAINER_LICENSE_KEY=${PORTAINER_LICENCE_KEY}
    command:
      - --host=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    networks:
      - management
    labels:
      - "logaggregation=yes"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_REMOVE_VOLUMES=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_INCLUDE_STOPPED=true

networks:
  management:
    external: true
  monitoring:
    external: true
  applications:
    external: true

volumes:
  portainer_data:
    name: portainer_data
